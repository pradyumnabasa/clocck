<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Windows Flip Clock</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Screensaver Overlay to capture events easily -->
  <div id="screensaver-overlay" style="display: none;"></div>

  <div class="app-container">
    <!-- Top Navigation -->
    <header class="top-nav">
      <button id="btn-mindfulness" class="icon-btn">🧠</button>
      <div class="tabs">
        <button id="tab-pomodoro" class="tab">Pomodoro</button>
        <button id="tab-clock" class="tab active">Clock</button>
        <button id="tab-timer" class="tab">Timer</button>
      </div>
      <button id="btn-settings" class="icon-btn">⚙️</button>
    </header>

    <!-- Main Content Area -->
    <main class="main-display">
      <div id="date-display" class="date-display">-- --- ---- ---</div>

      <!-- Flip Clock Container -->
      <div class="clock-container" id="clock-container">
        <!-- Hours -->
        <div class="flip-card" id="card-hours">
          <div class="digit-top">--</div>
          <div class="digit-bottom">--</div>
        </div>
        <!-- Minutes -->
        <div class="flip-card" id="card-minutes">
          <div class="digit-top">--</div>
          <div class="digit-bottom">--</div>
        </div>
        <!-- Seconds -->
        <div class="flip-card" id="card-seconds">
          <div class="digit-top">--</div>
          <div class="digit-bottom">--</div>
        </div>
      </div>

      <!-- Pomodoro / Timer Container (Hidden by default) -->
      <div class="timer-container" id="timer-container" style="display: none;">
        <div class="timer-display" id="timer-display">25:00</div>
        <div class="timer-controls">
          <button id="btn-timer-start" class="control-btn">Start</button>
          <button id="btn-timer-reset" class="control-btn">Reset</button>
        </div>
      </div>

      <div class="tagline">LESS IS MORE</div>
    </main>

    <!-- Bottom Controls -->
    <footer class="bottom-controls">
      <button id="btn-notifications" class="text-btn">🔔 OFF</button>
      <button id="btn-fullscreen" class="icon-btn">⛶</button>
    </footer>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
